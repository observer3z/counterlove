<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мы вместе ❤️</title>
<style>
*{box-sizing:border-box}

:root{
--bg1:#ffcfe0;
--bg2:#ffe8f1;
--bg3:#ffd4e6;
--card:rgba(255,255,255,.68);
--box:rgba(122,33,72,.08);
--text:#7a2148;
}

body.night{
--bg1:#1b0f18;
--bg2:#24121d;
--bg3:#2b1422;
--card:rgba(40,20,35,.75);
--box:rgba(255,255,255,.06);
--text:#ffd9ef;
}

body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
overflow:hidden;
color:var(--text);
position:relative;
transition:background .6s,color .4s;
}

.toggle{
position:fixed;
top:20px;
right:20px;
z-index:50;
border:none;
border-radius:999px;
padding:10px 16px;
font-size:14px;
cursor:pointer;
background:rgba(255,255,255,.6);
backdrop-filter:blur(6px);
}

body.night .toggle{background:rgba(0,0,0,.4);color:#fff}

.hearts{position:fixed;inset:0;pointer-events:none}

.heart{position:absolute;bottom:-40px;opacity:.35;animation:floatUp linear forwards}

@keyframes floatUp{
0%{transform:translateY(0) scale(.8);opacity:0}
20%{opacity:.6}
60%{transform:translateY(-60vh) scale(1.2) rotate(10deg)}
100%{transform:translateY(-120vh) scale(1.5) rotate(-10deg);opacity:0}
}

.cursor-heart{position:fixed;pointer-events:none;animation:cursorFade .9s ease forwards;z-index:20}

@keyframes cursorFade{
0%{transform:scale(.6);opacity:1}
100%{transform:translateY(-18px) scale(1.3);opacity:0}
}

.click-heart{position:fixed;pointer-events:none;animation:burst 1.2s ease-out forwards;z-index:30}

@keyframes burst{
0%{transform:translate3d(0,0,0) scale(.6);opacity:1}
100%{transform:translate3d(var(--x),var(--y),0) scale(1.4);opacity:0}
}

.card{
position:relative;
z-index:2;
width:min(92vw,760px);
background:var(--card);
backdrop-filter:blur(16px);
border-radius:30px;
box-shadow:0 22px 60px rgba(0,0,0,.15);
padding:38px 28px;
text-align:center;
}

.subtitle{font-size:14px;letter-spacing:2px;text-transform:uppercase;opacity:.7;margin-bottom:12px}

h1{margin:0;font-size:clamp(30px,5vw,54px)}

.date{margin-top:14px;font-size:17px;opacity:.82}

.main-counter{margin-top:28px;font-size:clamp(40px,9vw,82px);font-weight:700;line-height:1;position:relative}




50%{transform:translate(-50%,-50%) scale(3.3);opacity:.25}
100%{transform:translate(-50%,-50%) scale(2.8);opacity:.12}
}

.main-counter{
margin-top:28px;
text-align:center;
}

#daysNumber{
display:block;
font-size:clamp(40px,9vw,82px);
font-weight:700;
line-height:1;
}

.days-label{
margin-top:6px;
font-size:17px;
opacity:.8;
}

.grid{margin-top:30px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

.box{
background:var(--box);
border-radius:22px;
padding:18px 12px;
backdrop-filter:blur(4px);
}

.number{display:block;font-size:clamp(24px,4vw,34px);font-weight:700}

.label{display:block;margin-top:8px;font-size:14px;opacity:.72}

.message{
margin:28px 0 0;
font-size:clamp(17px,2.6vw,23px);
cursor:pointer;
user-select:none;
transition:transform .2s ease, opacity .2s ease;
}

.message:hover{
transform:scale(1.02);
opacity:.9;
}

@media(max-width:480px){
.grid{grid-template-columns:1fr}
}

.card{
padding:26px 14px 18px;
margin-top:58px;
}

.grid{
grid-template-columns:repeat(3,minmax(0,1fr));
gap:8px;
}

.box{
padding:14px 6px;
}

.number{
font-size:20px;
}

.label{
font-size:12px;
}

.message{
font-size:16px;
}
}
}
</style>
</head>
<body>

<button class="toggle" id="modeToggle">🌙 ночь</button>

<div class="hearts" id="hearts"></div>

<main class="card">
<div class="subtitle">Каждая секунда с тобой ❤️</div>
<h1>Мы вместе</h1>
<div class="date">С <span id="startDateText"></span></div>

<div class="main-counter">
<span id="daysNumber">0</span>
<div class="days-label">дней любви</div>
</div>

<section class="grid">
<div class="box"><span class="number" id="hours">00</span><span class="label">часов</span></div>
<div class="box"><span class="number" id="minutes">00</span><span class="label">минут</span></div>
<div class="box"><span class="number" id="seconds">00</span><span class="label">секунд</span></div>
</section>

<p class="message" id="message">Каждая секунда с тобой для меня особенная ❤️</p>
</main>

<script>
const startDate=new Date(2026,2,10,0,0,0);
const customDateText='10 марта 2026';

const daysNumber=document.getElementById('daysNumber');
const hoursEl=document.getElementById('hours');
const minutesEl=document.getElementById('minutes');
const secondsEl=document.getElementById('seconds');
const startDateText=document.getElementById('startDateText');
const hearts=document.getElementById('hearts');
const toggle=document.getElementById('modeToggle');
const messageEl=document.getElementById('message');

const savedTheme=localStorage.getItem('loveTheme');
const systemPrefersDark=window.matchMedia('(prefers-color-scheme: dark)');

const messagePool=[
'Каждая секунда с тобой для меня особенная ❤️',
'Даже расстояние не мешает мне любить тебя 💖',
'С тобой всё становится теплее и красивее ✨',
'Ты мой самый любимый человек ❤️',
'Я очень жду день, когда мы будем рядом 💌',
'Ты делаешь мои дни счастливее 🌷',
'Мне хорошо просто потому, что ты есть 💞',
'Моё сердце давно выбрало тебя ❤️',
'С тобой даже время ощущается по-другому ⏳❤️',
'Каждый день с тобой — мой любимый день 💗'
];

startDateText.textContent=customDateText;

function updateCounter(){
const now=new Date();
const diff=now-startDate;
if(diff<0)return;

const totalSeconds=Math.floor(diff/1000);
const totalMinutes=Math.floor(totalSeconds/60);
const totalHours=Math.floor(totalMinutes/60);

const days=Math.floor(totalHours/24);
const hours=totalHours%24;
const minutes=totalMinutes%60;
const seconds=totalSeconds%60;

daysNumber.textContent=days;

hoursEl.textContent=String(hours).padStart(2,'0');
minutesEl.textContent=String(minutes).padStart(2,'0');
secondsEl.textContent=String(seconds).padStart(2,'0');
}

function createHeart(){
const heart=document.createElement('div');
const icons=['❤','💖','💗','💘','💞'];
heart.className='heart';
heart.textContent=icons[Math.floor(Math.random()*icons.length)];
heart.style.left=Math.random()*100+'vw';
heart.style.fontSize=16+Math.random()*28+'px';
heart.style.animationDuration=6+Math.random()*5+'s';
hearts.appendChild(heart);
setTimeout(()=>heart.remove(),12000);
}

function cursorHeart(x,y){
const el=document.createElement('div');
el.className='cursor-heart';
const icons=['❤','💖','💗'];
el.textContent=icons[Math.floor(Math.random()*icons.length)];
el.style.left=x+'px';
el.style.top=y+'px';
el.style.fontSize=12+Math.random()*10+'px';
document.body.appendChild(el);
setTimeout(()=>el.remove(),900);
}

function clickBurst(x,y){
const icons=['❤','💖','💗','💘','💞'];
for(let i=0;i<14;i++){
const el=document.createElement('div');
el.className='click-heart';
el.textContent=icons[Math.floor(Math.random()*icons.length)];
el.style.left=x+'px';
el.style.top=y+'px';
el.style.fontSize=14+Math.random()*18+'px';
const angle=(Math.PI*2/14)*i;
const dist=50+Math.random()*90;
const dx=Math.cos(angle)*dist+'px';
const dy=Math.sin(angle)*dist+'px';
el.style.setProperty('--x',dx);
el.style.setProperty('--y',dy);
document.body.appendChild(el);
setTimeout(()=>el.remove(),1200);
}
}

function heartIntro(){
for(let i=0;i<40;i++){
setTimeout(()=>{
const heart=document.createElement('div');
heart.className='click-heart';
heart.textContent='❤';
heart.style.left=(window.innerWidth/2)+'px';
heart.style.top=(window.innerHeight/2)+'px';
heart.style.fontSize=16+Math.random()*20+'px';
const angle=Math.random()*Math.PI*2;
const dist=80+Math.random()*140;
heart.style.setProperty('--x',Math.cos(angle)*dist+'px');
heart.style.setProperty('--y',Math.sin(angle)*dist+'px');
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),1200);
},i*40);
}
}

updateCounter();
setInterval(updateCounter,1000);
setInterval(createHeart,650);

heartIntro();

let lastMove=0;
window.addEventListener('mousemove',e=>{
const now=Date.now();
if(now-lastMove>45){cursorHeart(e.clientX,e.clientY);lastMove=now}
});

window.addEventListener('click',e=>{
clickBurst(e.clientX,e.clientY);
});

function applyTheme(mode){
if(mode==='night'){
  document.body.classList.add('night');
  toggle.textContent='☀️ день';
}else{
  document.body.classList.remove('night');
  toggle.textContent='🌙 ночь';
}
}

function getPreferredTheme(){
if(savedTheme==='day' || savedTheme==='night') return savedTheme;
return systemPrefersDark.matches ? 'night' : 'day';
}

applyTheme(getPreferredTheme());

systemPrefersDark.addEventListener('change',e=>{
  const manualTheme=localStorage.getItem('loveTheme');
  if(!manualTheme){
    applyTheme(e.matches ? 'night' : 'day');
  }
});

toggle.addEventListener('click',()=>{
  const nextMode=document.body.classList.contains('night') ? 'day' : 'night';
  localStorage.setItem('loveTheme', nextMode);
  applyTheme(nextMode);
});

messageEl.addEventListener('click',()=>{
const current=messageEl.textContent;
let next=current;
while(next===current){
next=messagePool[Math.floor(Math.random()*messagePool.length)];
}
messageEl.textContent=next;
});
</script>

</body>
</html>
